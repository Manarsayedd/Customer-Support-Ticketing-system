version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: ticketing_dev
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ticket-service:
    build: ./ticket-service
    environment:
      DB_USER: dev_user
      DB_PASSWORD: dev_password
      DB_NAME: ticketing_dev
      DB_HOST: postgres
    depends_on:
      - postgres
    ports:
      - "3001:3001"

  support-service:
    build: ./support-service
    environment:
      DB_USER: dev_user
      DB_PASSWORD: dev_password
      DB_NAME: ticketing_dev
      DB_HOST: postgres
    depends_on:
      - postgres
    ports:
      - "3002:3002"

  notification-service:
    build: ./notification-service
    ports:
      - "3003:3003"
    environment:
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER: amaamoun99@gmail.com
      SMTP_PASS: dnof wgfc rfwi nxdb
      SMTP_FROM: "Support <amaamoun99@gmail.com>"

  reporting-service:
    build: ./reporting-service
    environment:
      DB_USER: dev_user
      DB_PASSWORD: dev_password
      DB_NAME: ticketing_dev
      DB_HOST: postgres
    depends_on:
      - postgres
    ports:
      - "3004:3004"

  api-gateway:
    build: ./api-gateway
    ports:
      - "8081:80"
    depends_on:
      - ticket-service
      - support-service
      - reporting-service

volumes:
  postgres_dev_data:
