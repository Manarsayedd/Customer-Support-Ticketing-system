services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: ticketing_dev
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  ticket-service:
    build: ./ticket-service
    environment:
      DB_USER: dev_user
      DB_PASSWORD: dev_password
      DB_NAME: ticketing_dev
      DB_HOST: postgres
    depends_on:
      - postgres
    ports:
      - "3001:3001"

  support-service:
    build: ./support-service
    environment:
      DB_USER: dev_user
      DB_PASSWORD: dev_password
      DB_NAME: ticketing_dev
      DB_HOST: postgres
    depends_on:
      - postgres
    ports:
      - "3002:3002"

  notification-service:
    build: ./notification-service
    ports:
      - "3003:3003"

  reporting-service:
    build: ./reporting-service
    environment:
      DB_USER: dev_user
      DB_PASSWORD: dev_password
      DB_NAME: ticketing_dev
      DB_HOST: postgres
    depends_on:
      - postgres
    ports:
      - "3004:3004"

  api-gateway:
    build: ./api-gateway
    ports:
      - "80:80"
    depends_on:
      - ticket-service
      - support-service
      - reporting-service
