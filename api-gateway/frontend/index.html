<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Hub – Customer Portal</title>
    <meta name="description" content="Submit a support ticket and track its progress in real time.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:#0d0f1a; --surface:rgba(255,255,255,0.05); --surface2:rgba(255,255,255,0.08);
            --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.18);
            --primary:#6366f1; --ph:#818cf8; --green:#22c55e; --yellow:#f59e0b;
            --blue:#3b82f6; --red:#ef4444; --orange:#f97316;
            --text:#e2e8f0; --muted:#64748b; --radius:14px; --tr:0.22s ease;
        }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background: radial-gradient(ellipse 70% 55% at 10% 5%, rgba(99,102,241,0.20) 0%, transparent 60%),
                        radial-gradient(ellipse 60% 50% at 90% 90%, rgba(139,92,246,0.15) 0%, transparent 60%);
        }
        .page { position:relative; z-index:1; max-width:700px; margin:0 auto; padding:40px 20px 80px; }
        .header { text-align:center; margin-bottom:40px; }
        .header-icon {
            width:60px; height:60px; background:linear-gradient(135deg,var(--primary),#8b5cf6);
            border-radius:18px; display:grid; place-items:center; font-size:28px;
            box-shadow:0 0 32px rgba(99,102,241,0.45); margin:0 auto 16px;
        }
        .header h1 { font-size:clamp(1.5rem,4vw,2rem); font-weight:700; letter-spacing:-0.02em; }
        .header p  { color:var(--muted); font-size:0.88rem; margin-top:6px; }
        .agent-link {
            display:inline-flex; align-items:center; gap:6px;
            margin-top:14px; color:var(--muted); font-size:0.76rem;
            text-decoration:none; border:1px solid var(--border); border-radius:20px; padding:5px 14px;
            transition:all var(--tr);
        }
        .agent-link:hover { color:var(--text); border-color:var(--border2); }
        .welcome-card {
            background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
            padding:40px 36px; backdrop-filter:blur(20px); text-align:center;
        }
        .welcome-card h2 { font-size:1.2rem; font-weight:600; margin-bottom:8px; }
        .welcome-card p  { color:var(--muted); font-size:0.86rem; margin-bottom:28px; }
        .welcome-row { display:flex; gap:10px; }
        .card {
            background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
            padding:26px 28px; backdrop-filter:blur(20px);
        }
        .section-label {
            font-size:0.68rem; font-weight:700; letter-spacing:0.14em;
            text-transform:uppercase; color:var(--muted); margin-bottom:18px;
        }
        .form-grid  { display:flex; flex-direction:column; gap:15px; }
        .form-group label { display:block; font-size:0.78rem; font-weight:500; color:#94a3b8; margin-bottom:6px; }
        .form-group input, .form-group textarea {
            width:100%; padding:11px 14px; background:rgba(255,255,255,0.06);
            border:1px solid var(--border); border-radius:10px; color:var(--text);
            font-family:'Inter',sans-serif; font-size:0.88rem; outline:none; resize:none;
            transition:border-color var(--tr), box-shadow var(--tr), background var(--tr);
        }
        .form-group input::placeholder, .form-group textarea::placeholder { color:var(--muted); }
        .form-group input:focus, .form-group textarea:focus {
            border-color:var(--primary); background:rgba(99,102,241,0.07);
            box-shadow:0 0 0 3px rgba(99,102,241,0.18);
        }
        .btn {
            display:inline-flex; align-items:center; gap:7px;
            padding:11px 22px; border:none; border-radius:10px;
            font-family:'Inter',sans-serif; font-size:0.86rem; font-weight:600;
            cursor:pointer; transition:all var(--tr); white-space:nowrap;
        }
        .btn-primary {
            background:linear-gradient(135deg,var(--primary),#8b5cf6);
            color:#fff; box-shadow:0 4px 14px rgba(99,102,241,0.35);
        }
        .btn-primary:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 22px rgba(99,102,241,0.45); }
        .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
        .btn-ghost:hover { color:var(--text); border-color:var(--border2); }
        .divider {
            display:flex; align-items:center; gap:14px; margin:28px 0;
            color:var(--muted); font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase;
        }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
        .user-bar {
            display:flex; justify-content:space-between; align-items:center;
            background:var(--surface); border:1px solid var(--border); border-radius:12px;
            padding:12px 18px; margin-bottom:24px; flex-wrap:wrap; gap:10px;
        }
        .user-bar-left { display:flex; align-items:center; gap:10px; }
        .user-avatar {
            width:36px; height:36px; border-radius:50%;
            background:linear-gradient(135deg,var(--primary),#8b5cf6);
            display:grid; place-items:center; font-size:0.82rem; font-weight:700; color:#fff;
        }
        .user-greeting-name { font-size:0.88rem; font-weight:600; }
        .user-greeting-sub  { font-size:0.72rem; color:var(--muted); margin-top:1px; }
        .btn-sm { padding:6px 13px; font-size:0.74rem; border-radius:8px; }
        #myTickets { display:flex; flex-direction:column; gap:12px; }
        .ticket-card {
            background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
            overflow:hidden; transition:border-color var(--tr), box-shadow var(--tr);
            animation:slideIn 0.28s ease both;
        }
        .ticket-card:hover { border-color:var(--border2); box-shadow:0 6px 28px rgba(0,0,0,0.22); }
        @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .ticket-main { padding:18px 22px; cursor:pointer; }
        .ticket-top {
            display:flex; justify-content:space-between; align-items:flex-start;
            gap:10px; flex-wrap:wrap; margin-bottom:6px;
        }
        .ticket-id-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .ticket-num {
            font-size:0.67rem; font-weight:700; color:var(--ph);
            background:rgba(99,102,241,0.12); border:1px solid rgba(99,102,241,0.22);
            padding:2px 7px; border-radius:5px; letter-spacing:0.05em; white-space:nowrap;
        }
        .ticket-title-text { font-size:0.93rem; font-weight:600; }
        .ticket-badges { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
        .ticket-desc { color:#94a3b8; font-size:0.82rem; line-height:1.6; margin-bottom:12px; }
        .ticket-footer {
            display:flex; justify-content:space-between; align-items:center;
            flex-wrap:wrap; gap:8px;
        }
        .ticket-meta { font-size:0.7rem; color:var(--muted); display:flex; align-items:center; gap:5px; }
        /* Progress stepper */
        .progress-wrap { margin-bottom:4px; }
        .stepper { display:flex; align-items:center; margin-bottom:6px; }
        .step-dot {
            width:22px; height:22px; border-radius:50%; border:2px solid var(--border);
            display:grid; place-items:center; font-size:0.58rem; font-weight:700;
            background:var(--bg); color:var(--muted); flex-shrink:0; z-index:1;
            transition:all 0.4s ease;
        }
        .step-line { flex:1; height:2px; background:var(--border); transition:background 0.4s; }
        .step-done   .step-dot { background:var(--green); border-color:var(--green); color:#fff; }
        .step-active .step-dot { background:var(--primary); border-color:var(--primary); color:#fff; box-shadow:0 0 10px rgba(99,102,241,0.5); }
        .step-done   .step-line { background:var(--green); }
        .step-labels { display:flex; justify-content:space-between; }
        .step-lbl { font-size:0.6rem; color:var(--muted); text-align:center; flex:1; }
        .step-lbl.active, .step-lbl.done { color:var(--text); }
        .badge {
            display:inline-flex; align-items:center; gap:4px; padding:3px 9px;
            border-radius:20px; font-size:0.65rem; font-weight:700;
            letter-spacing:0.07em; text-transform:uppercase; white-space:nowrap;
        }
        .badge::before { content:''; display:inline-block; width:5px; height:5px; border-radius:50%; background:currentColor; opacity:0.8; }
        .badge-open        { background:rgba(245,158,11,0.12); color:var(--yellow); border:1px solid rgba(245,158,11,0.25); }
        .badge-in_progress { background:rgba(59,130,246,0.12);  color:var(--blue);   border:1px solid rgba(59,130,246,0.25); }
        .badge-resolved    { background:rgba(34,197,94,0.12);   color:var(--green);  border:1px solid rgba(34,197,94,0.25); }
        .badge-low    { background:rgba(100,116,139,0.12); color:#94a3b8; border:1px solid rgba(100,116,139,0.25); }
        .badge-medium { background:rgba(59,130,246,0.10);  color:#60a5fa; border:1px solid rgba(59,130,246,0.22); }
        .badge-high   { background:rgba(249,115,22,0.12);  color:var(--orange); border:1px solid rgba(249,115,22,0.25); }
        .badge-urgent { background:rgba(239,68,68,0.12);   color:var(--red);    border:1px solid rgba(239,68,68,0.25); }
        .ticket-detail { display:none; padding:0 22px 18px; border-top:1px solid var(--border); }
        .ticket-detail.open { display:block; }
        .detail-title { font-size:0.67rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin:14px 0 10px; }
        .agent-card {
            display:flex; align-items:center; gap:10px;
            background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:10px 14px;
        }
        .agent-av {
            width:30px; height:30px; border-radius:50%;
            background:linear-gradient(135deg,#0ea5e9,#6366f1);
            display:grid; place-items:center; font-size:0.68rem; font-weight:700; color:#fff; flex-shrink:0;
        }
        .agent-name { font-size:0.83rem; font-weight:600; }
        .agent-role { font-size:0.7rem; color:var(--muted); }
        .resp-item { display:flex; gap:10px; margin-bottom:10px; animation:slideIn 0.25s ease both; }
        .resp-av {
            width:28px; height:28px; border-radius:50%;
            background:linear-gradient(135deg,#0ea5e9,#6366f1);
            display:grid; place-items:center; font-size:0.65rem; font-weight:700; color:#fff; flex-shrink:0;
        }
        .resp-bubble {
            background:var(--surface2); border:1px solid var(--border); border-radius:10px;
            padding:9px 13px; flex:1;
        }
        .resp-meta { display:flex; justify-content:space-between; margin-bottom:4px; }
        .resp-agent { font-size:0.73rem; font-weight:600; color:var(--ph); }
        .resp-time  { font-size:0.65rem; color:var(--muted); }
        .resp-msg   { font-size:0.82rem; color:#cbd5e1; line-height:1.55; }
        .no-resp { font-size:0.8rem; color:var(--muted); padding:4px 0; }
        .skeleton { display:flex; flex-direction:column; gap:12px; }
        .skel-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px 22px; }
        .sk { background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.04) 75%); background-size:200% 100%; border-radius:6px; animation:shimmer 1.4s infinite; }
        @keyframes shimmer { to{background-position:-200% 0} }
        .sk-t{height:13px;width:50%;margin-bottom:10px} .sk-l{height:10px;width:80%;margin-bottom:8px} .sk-s{height:10px;width:35%}
        .state-msg { text-align:center; padding:44px 20px; color:var(--muted); }
        .state-msg .icon { font-size:2.4rem; margin-bottom:12px; }
        .state-msg p { font-size:0.88rem; }
        .state-msg.error p { color:#f87171; }
        #toast {
            position:fixed; bottom:24px; right:24px; background:#1e293b; border:1px solid var(--border);
            border-radius:12px; padding:12px 18px; font-size:0.82rem; color:var(--text);
            box-shadow:0 8px 32px rgba(0,0,0,0.4); display:flex; align-items:center; gap:10px;
            z-index:200; transform:translateY(80px); opacity:0; max-width:320px;
            transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
        }
        #toast.show { transform:translateY(0); opacity:1; }
        #toast.toast-success { border-color:rgba(34,197,94,0.35); }
        #toast.toast-error   { border-color:rgba(239,68,68,0.35); }
        @media(max-width:540px){ .card{padding:18px 16px} .welcome-row{flex-direction:column} }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <div class="header-icon">🙋</div>
        <h1>Support Hub</h1>
        <p>Submit a ticket and track your support requests in real time</p>
        <a href="/agent.html" class="agent-link">🛠 Support Agent Portal →</a>
    </div>

    <!-- Name gate -->
    <div id="welcomeView">
        <div class="welcome-card">
            <h2>Welcome! Who are you?</h2>
            <p>Enter your name so we can show you your tickets and their updates.</p>
            <div class="welcome-row">
                <div class="form-group" style="flex:1">
                    <input type="text" id="nameInput" placeholder="Your name or email…" autocomplete="off" maxlength="80">
                </div>
                <button class="btn btn-primary" onclick="startSession()">Continue →</button>
            </div>
        </div>
    </div>

    <!-- Main portal (shown after name) -->
    <div id="mainView" style="display:none">
        <div class="user-bar">
            <div class="user-bar-left">
                <div class="user-avatar" id="userAvatar"></div>
                <div>
                    <div class="user-greeting-name" id="userName"></div>
                    <div class="user-greeting-sub">Your tickets are shown below</div>
                </div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="switchUser()">Switch user</button>
        </div>

        <div class="card" style="margin-bottom:28px">
            <p class="section-label">✦ Submit a New Ticket</p>
            <form id="ticketForm" class="form-grid">
                <div class="form-group">
                    <label for="ticketTitle">Issue Title</label>
                    <input type="text" id="ticketTitle" placeholder="Brief summary of your issue…" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="ticketEmail">Your Email</label>
                    <input type="email" id="ticketEmail" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="ticketDesc">Description</label>
                    <textarea id="ticketDesc" rows="4" placeholder="Describe the problem in detail…" required></textarea>
                </div>
                <div>
                    <button id="submitBtn" type="submit" class="btn btn-primary">
                        <span id="submitIcon">🚀</span>
                        <span id="submitLabel">Submit Ticket</span>
                    </button>
                </div>
            </form>
        </div>

        <div class="divider">Your Tickets</div>
        <div id="myTickets">
            <div class="skeleton">
                <div class="skel-card"><div class="sk sk-t"></div><div class="sk sk-l"></div><div class="sk sk-s"></div></div>
                <div class="skel-card"><div class="sk sk-t"></div><div class="sk sk-l"></div><div class="sk sk-s"></div></div>
            </div>
        </div>
    </div>
</div>
<div id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>
<script src="customer.js"></script>
</body>
</html>
