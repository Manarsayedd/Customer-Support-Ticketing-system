<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Hub – Agent Dashboard</title>
    <meta name="description" content="Agent dashboard — manage, prioritize and resolve support tickets.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
        :root {
            --bg:#0d0f1a; --surface:rgba(255,255,255,0.05); --surface2:rgba(255,255,255,0.08);
            --border:rgba(255,255,255,0.10); --border2:rgba(255,255,255,0.18);
            --primary:#6366f1; --ph:#818cf8; --green:#22c55e; --yellow:#f59e0b;
            --blue:#3b82f6; --red:#ef4444; --orange:#f97316;
            --text:#e2e8f0; --muted:#64748b; --radius:14px; --tr:0.22s ease;
        }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        body::before {
            content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
            background: radial-gradient(ellipse 70% 55% at 85% 5%,  rgba(99,102,241,0.18) 0%, transparent 60%),
                        radial-gradient(ellipse 60% 50% at 10% 90%, rgba(139,92,246,0.14) 0%, transparent 60%);
        }
        .page { position:relative; z-index:1; max-width:960px; margin:0 auto; padding:36px 20px 80px; }
        /* Header */
        .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:32px; flex-wrap:wrap; gap:12px; }
        .header-left { display:flex; align-items:center; gap:14px; }
        .header-icon { width:48px; height:48px; background:linear-gradient(135deg,#f59e0b,#ef4444); border-radius:14px; display:grid; place-items:center; font-size:22px; box-shadow:0 0 24px rgba(245,158,11,0.4); flex-shrink:0; }
        .header h1 { font-size:clamp(1.2rem,3vw,1.6rem); font-weight:700; letter-spacing:-0.02em; }
        .header p  { color:var(--muted); font-size:0.8rem; margin-top:2px; }
        .customer-link { display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:0.76rem; text-decoration:none; border:1px solid var(--border); border-radius:20px; padding:6px 14px; transition:all var(--tr); }
        .customer-link:hover { color:var(--text); border-color:var(--border2); }
        /* Tabs */
        .tab-nav { display:flex; gap:4px; margin-bottom:24px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:5px; }
        .tab-btn { flex:1; padding:9px 12px; border:none; border-radius:9px; background:transparent; color:var(--muted); font-family:'Inter',sans-serif; font-size:0.82rem; font-weight:500; cursor:pointer; transition:all var(--tr); display:flex; align-items:center; justify-content:center; gap:6px; }
        .tab-btn:hover { color:var(--text); background:var(--surface2); }
        .tab-btn.active { background:linear-gradient(135deg,#f59e0b,#ef4444); color:#fff; box-shadow:0 2px 12px rgba(245,158,11,0.3); }
        .tab-pane { display:none; }
        .tab-pane.active { display:block; }
        /* Stats */
        .stats-bar { display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap; }
        .stat-chip { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px 16px; flex:1; min-width:80px; text-align:center; }
        .stat-chip .num { font-size:1.35rem; font-weight:700; }
        .stat-chip .lbl { font-size:0.63rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:2px; }
        .stat-open .num { color:var(--yellow); } .stat-ip .num { color:var(--blue); } .stat-res .num { color:var(--green); }
        /* Card */
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px 26px; backdrop-filter:blur(20px); }
        .section-label { font-size:0.67rem; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:16px; }
        /* Form elements */
        .form-group label { display:block; font-size:0.76rem; font-weight:500; color:#94a3b8; margin-bottom:5px; }
        .form-group input, .form-group textarea, .form-group select {
            width:100%; padding:10px 13px; background:rgba(255,255,255,0.06); border:1px solid var(--border);
            border-radius:9px; color:var(--text); font-family:'Inter',sans-serif; font-size:0.86rem;
            outline:none; resize:none; appearance:none; transition:border-color var(--tr), box-shadow var(--tr);
        }
        .form-group input::placeholder, .form-group textarea::placeholder { color:var(--muted); }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(99,102,241,0.18); }
        .form-group select option { background:#1e293b; }
        .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        /* Buttons */
        .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border:none; border-radius:9px; font-family:'Inter',sans-serif; font-size:0.83rem; font-weight:600; cursor:pointer; transition:all var(--tr); white-space:nowrap; }
        .btn-primary { background:linear-gradient(135deg,var(--primary),#8b5cf6); color:#fff; box-shadow:0 4px 14px rgba(99,102,241,0.3); }
        .btn-primary:hover:not(:disabled) { transform:translateY(-2px); }
        .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-sm { padding:6px 13px; font-size:0.76rem; border-radius:8px; }
        .btn-resolve { background:rgba(34,197,94,0.12);  color:var(--green);  border:1px solid rgba(34,197,94,0.25); }
        .btn-resolve:hover { background:rgba(34,197,94,0.22); transform:translateY(-1px); }
        .btn-respond { background:rgba(59,130,246,0.12);  color:var(--blue);   border:1px solid rgba(59,130,246,0.25); }
        .btn-respond:hover { background:rgba(59,130,246,0.22); transform:translateY(-1px); }
        .btn-save    { background:rgba(245,158,11,0.12);  color:var(--yellow); border:1px solid rgba(245,158,11,0.25); }
        .btn-save:hover { background:rgba(245,158,11,0.22); transform:translateY(-1px); }
        /* Divider */
        .divider { display:flex; align-items:center; gap:12px; margin:20px 0 16px; color:var(--muted); font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
        /* Badges */
        .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:0.65rem; font-weight:700; letter-spacing:0.07em; text-transform:uppercase; white-space:nowrap; }
        .badge::before { content:''; display:inline-block; width:5px; height:5px; border-radius:50%; background:currentColor; opacity:0.8; }
        .badge-open        { background:rgba(245,158,11,0.12); color:var(--yellow); border:1px solid rgba(245,158,11,0.25); }
        .badge-in_progress { background:rgba(59,130,246,0.12);  color:var(--blue);   border:1px solid rgba(59,130,246,0.25); }
        .badge-resolved    { background:rgba(34,197,94,0.12);   color:var(--green);  border:1px solid rgba(34,197,94,0.25); }
        .badge-low    { background:rgba(100,116,139,0.12); color:#94a3b8; border:1px solid rgba(100,116,139,0.25); }
        .badge-medium { background:rgba(59,130,246,0.10);  color:#60a5fa; border:1px solid rgba(59,130,246,0.22); }
        .badge-high   { background:rgba(249,115,22,0.12);  color:var(--orange); border:1px solid rgba(249,115,22,0.25); }
        .badge-urgent { background:rgba(239,68,68,0.12);   color:var(--red);    border:1px solid rgba(239,68,68,0.25); }
        /* Ticket cards */
        #ticketsList { display:flex; flex-direction:column; gap:12px; }
        .ticket-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:border-color var(--tr), box-shadow var(--tr); animation:slideIn 0.28s ease both; }
        .ticket-card:hover { border-color:var(--border2); box-shadow:0 6px 28px rgba(0,0,0,0.22); }
        @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .ticket-main { padding:16px 20px; cursor:pointer; }
        .ticket-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; margin-bottom:5px; }
        .ticket-id-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .ticket-num { font-size:0.67rem; font-weight:700; color:var(--ph); background:rgba(99,102,241,0.12); border:1px solid rgba(99,102,241,0.22); padding:2px 7px; border-radius:5px; white-space:nowrap; }
        .ticket-title-text { font-size:0.92rem; font-weight:600; }
        .ticket-badges { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
        .ticket-submitter { font-size:0.72rem; color:var(--muted); margin-bottom:5px; }
        .ticket-desc { color:#94a3b8; font-size:0.81rem; line-height:1.6; margin-bottom:10px; }
        .ticket-footer { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        .ticket-meta { font-size:0.69rem; color:var(--muted); display:flex; align-items:center; gap:5px; }
        .ticket-actions { display:flex; gap:8px; flex-wrap:wrap; }
        /* Detail panel */
        .ticket-detail { display:none; padding:0 20px 18px; border-top:1px solid var(--border); }
        .ticket-detail.open { display:block; }
        .detail-title { font-size:0.66rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin:14px 0 10px; }
        /* Assign form */
        .assign-form { display:grid; grid-template-columns:1fr 1fr auto; gap:10px; align-items:end; }
        /* Respond form */
        .respond-form { display:flex; gap:10px; flex-wrap:wrap; }
        .respond-form .form-group:first-child { flex:0 0 160px; }
        .respond-form .form-group:last-child  { flex:1; min-width:180px; }
        /* Responses */
        .resp-item { display:flex; gap:10px; margin-bottom:10px; animation:slideIn 0.25s ease both; }
        .resp-av { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#0ea5e9,#6366f1); display:grid; place-items:center; font-size:0.65rem; font-weight:700; color:#fff; flex-shrink:0; }
        .resp-bubble { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:9px 13px; flex:1; }
        .resp-meta { display:flex; justify-content:space-between; margin-bottom:4px; }
        .resp-agent { font-size:0.73rem; font-weight:600; color:var(--ph); }
        .resp-time  { font-size:0.65rem; color:var(--muted); }
        .resp-msg   { font-size:0.82rem; color:#cbd5e1; line-height:1.55; }
        .no-resp { font-size:0.8rem; color:var(--muted); padding:4px 0; }
        /* Reports */
        .report-kpis { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }
        .kpi { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; flex:1; min-width:110px; text-align:center; }
        .kpi .kval { font-size:1.55rem; font-weight:700; color:var(--ph); }
        .kpi .klbl { font-size:0.66rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:3px; }
        .pri-rows { margin-bottom:24px; }
        .pri-row { display:flex; align-items:center; gap:12px; margin-bottom:10px; }
        .pri-lbl { font-size:0.75rem; font-weight:600; width:58px; }
        .pri-track { flex:1; height:8px; background:rgba(255,255,255,0.06); border-radius:99px; overflow:hidden; }
        .pri-fill  { height:100%; border-radius:99px; transition:width 0.8s cubic-bezier(0.34,1.1,0.64,1); }
        .pri-count { font-size:0.73rem; color:var(--muted); width:22px; text-align:right; }
        .tbl-wrap { overflow-x:auto; border-radius:12px; border:1px solid var(--border); }
        table { width:100%; border-collapse:collapse; font-size:0.79rem; }
        thead { background:var(--surface2); }
        th { padding:9px 13px; text-align:left; font-size:0.66rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); white-space:nowrap; }
        td { padding:9px 13px; border-bottom:1px solid var(--border); vertical-align:middle; }
        tr:last-child td { border-bottom:none; }
        tr:hover td { background:rgba(255,255,255,0.02); }
        /* Skeleton */
        .skeleton { display:flex; flex-direction:column; gap:12px; }
        .skel-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px 20px; }
        .sk { background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.09) 50%,rgba(255,255,255,0.04) 75%); background-size:200% 100%; border-radius:6px; animation:shimmer 1.4s infinite; }
        @keyframes shimmer { to{background-position:-200% 0} }
        .sk-t{height:13px;width:50%;margin-bottom:10px} .sk-l{height:10px;width:80%;margin-bottom:8px} .sk-s{height:10px;width:35%}
        .state-msg { text-align:center; padding:44px 20px; color:var(--muted); }
        .state-msg .icon { font-size:2.4rem; margin-bottom:12px; }
        .state-msg p { font-size:0.88rem; }
        .state-msg.error p { color:#f87171; }
        #toast { position:fixed; bottom:24px; right:24px; background:#1e293b; border:1px solid var(--border); border-radius:12px; padding:12px 18px; font-size:0.82rem; color:var(--text); box-shadow:0 8px 32px rgba(0,0,0,0.4); display:flex; align-items:center; gap:10px; z-index:200; transform:translateY(80px); opacity:0; max-width:320px; transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1); }
        #toast.show { transform:translateY(0); opacity:1; }
        #toast.toast-success { border-color:rgba(34,197,94,0.35); }
        #toast.toast-error   { border-color:rgba(239,68,68,0.35); }
        @media(max-width:640px){ .assign-form{grid-template-columns:1fr; } .form-row{grid-template-columns:1fr;} }
    </style>
</head>
<body>
<div class="page">
    <div class="header">
        <div class="header-left">
            <div class="header-icon">🛠</div>
            <div>
                <h1>Agent Dashboard</h1>
                <p>Manage, prioritize and resolve customer tickets</p>
            </div>
        </div>
        <a href="/" class="customer-link">🙋 Customer Portal →</a>
    </div>

    <nav class="tab-nav" role="tablist">
        <button id="tab-all"     class="tab-btn active" onclick="switchTab('all')">🗂 All Tickets</button>
        <button id="tab-reports" class="tab-btn"        onclick="switchTab('reports')">📊 Reports</button>
    </nav>

    <!-- All Tickets tab -->
    <div id="pane-all" class="tab-pane active">
        <div class="stats-bar" id="statsBar"></div>
        <div id="ticketsList">
            <div class="skeleton">
                <div class="skel-card"><div class="sk sk-t"></div><div class="sk sk-l"></div><div class="sk sk-s"></div></div>
                <div class="skel-card"><div class="sk sk-t"></div><div class="sk sk-l"></div><div class="sk sk-s"></div></div>
                <div class="skel-card"><div class="sk sk-t"></div><div class="sk sk-l"></div><div class="sk sk-s"></div></div>
            </div>
        </div>
    </div>

    <!-- Reports tab -->
    <div id="pane-reports" class="tab-pane">
        <div id="reportsContent">
            <div class="skeleton"><div class="skel-card"><div class="sk sk-t"></div><div class="sk sk-l"></div><div class="sk sk-s"></div></div></div>
        </div>
    </div>
</div>

<div id="toast"><span id="toastIcon"></span><span id="toastMsg"></span></div>
<script src="agent.js"></script>
</body>
</html>
