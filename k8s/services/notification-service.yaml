apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: notification-service:latest
        imagePullPolicy: Never
        env:
        - name: SMTP_HOST
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: SMTP_PORT
        - name: SMTP_SECURE
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: SMTP_SECURE
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: SMTP_USER
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: SMTP_PASS
        - name: SMTP_FROM
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: SMTP_FROM
        ports:
        - containerPort: 3003
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  type: ClusterIP
  selector:
    app: notification-service
  ports:
  - port: 3003
    targetPort: 3003
