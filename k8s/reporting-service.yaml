apiVersion: apps/v1
kind: Deployment
metadata:
  name: reporting-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reporting-service
  template:
    metadata:
      labels:
        app: reporting-service
    spec:
      containers:
      - name: reporting-service
        image: reporting-service:latest
        imagePullPolicy: Never
        env:
        - name: DB_HOST
          value: "postgres"
        - name: DB_USER
          value: "k8s_user"
        - name: DB_PASSWORD
          value: "k8s_password"
        - name: DB_NAME
          value: "ticketing"
        ports:
        - containerPort: 3004
---
apiVersion: v1
kind: Service
metadata:
  name: reporting-service
spec:
  type: ClusterIP
  selector:
    app: reporting-service
  ports:
  - port: 3004
    targetPort: 3004
